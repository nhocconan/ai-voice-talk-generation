services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice_pass
      POSTGRES_DB: voice_studio
    volumes:
      - ./infra/volumes/postgres:/var/lib/postgresql/data
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./infra/volumes/redis:/data
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./infra/volumes/minio:/data
    ports:
      - "${HOST_MINIO_PORT:-9000}:9000"
      - "${HOST_MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/voice-studio &&
        mc anonymous set none local/voice-studio &&
        echo 'MinIO bucket ready'
      "
    restart: on-failure

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/volumes/caddy/data:/data
      - ./infra/volumes/caddy/config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
      - "${HOST_HTTPS_PORT:-443}:443"
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    user: "0"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        cat >/tmp/prometheus.yml <<'EOF'
        global:
          scrape_interval: 30s
          evaluation_interval: 30s

        scrape_configs:
          - job_name: voice_studio_web
            static_configs:
              - targets:
                  - host.docker.internal:3000
            metrics_path: /api/metrics

          - job_name: prometheus
            static_configs:
              - targets:
                  - localhost:9090
        EOF
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d
    volumes:
      - ./infra/volumes/prometheus:/prometheus
    ports:
      - "${HOST_PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    user: "0"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/volumes/grafana:/var/lib/grafana
    ports:
      - "${HOST_GRAFANA_PORT:-3001}:3000"

  # In development only — web and worker run outside Docker
  # Uncomment for production:
  #
  # web:
  #   build: { context: apps/web, dockerfile: ../../infra/docker/web.Dockerfile }
  #   depends_on: [postgres, redis, minio]
  #   env_file: .env
  #   ports:
  #     - "3000:3000"
  #
  # worker:
  #   build: { context: apps/worker, dockerfile: ../../infra/docker/worker.Dockerfile }
  #   depends_on: [postgres, redis, minio]
  #   env_file: .env
  #   environment:
  #     TORCH_DEVICE: cpu

networks:
  default:
    name: voice-studio
