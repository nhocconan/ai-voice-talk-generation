version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice_pass
      POSTGRES_DB: voice_studio
    volumes:
      - ./infra/volumes/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./infra/volumes/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./infra/volumes/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/voice-studio &&
        mc anonymous set none local/voice-studio &&
        echo 'MinIO bucket ready'
      "
    restart: on-failure

  # In development only — web and worker run outside Docker
  # Uncomment for production:
  #
  # web:
  #   build: { context: apps/web, dockerfile: ../../infra/docker/web.Dockerfile }
  #   depends_on: [postgres, redis, minio]
  #   env_file: .env
  #   ports:
  #     - "3000:3000"
  #
  # worker:
  #   build: { context: apps/worker, dockerfile: ../../infra/docker/worker.Dockerfile }
  #   depends_on: [postgres, redis, minio]
  #   env_file: .env
  #   environment:
  #     TORCH_DEVICE: cpu

networks:
  default:
    name: voice-studio
